; M5Stack Game Boy Emulator (peanut-gb core)
; Supported boards: M5Stack Core2 (recommended), M5Stack Core (Basic/Gray/Fire)

[platformio]
default_envs = m5stack-core2
src_dir = m5stack_gameboy

; ─── M5Stack Core2 (8MB PSRAM, AW88298 speaker) ────────────────────────────
[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino
lib_deps =
    m5stack/M5Core2@^0.1.6
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_flags =
    -DCONFIG_BOARD_SELECTED
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -O2
    -DM5CORE2
    -DPEANUT_GB_HIGH_LCD_ACCURACY=0
    -DENABLE_SOUND=1
upload_speed = 1500000

; ─── M5Stack Core / Basic / Gray / Fire ─────────────────────────────────────
[env:m5stack-core]
platform = espressif32
board = m5stack-core
framework = arduino
lib_deps =
    m5stack/M5Stack@^0.4.6
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_flags =
    -DCONFIG_BOARD_SELECTED
    -O2
    -DM5CORE1
    -DPEANUT_GB_HIGH_LCD_ACCURACY=0
upload_speed = 1500000
